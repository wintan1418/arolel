name: Bug report
description: Report something broken in Arolel.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Go to ...
        2. Upload/click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser/device
      placeholder: Chrome 124 on macOS, Safari on iPhone, etc.
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, logs, or sample files if safe to share.
