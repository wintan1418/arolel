name: Feature request
description: Suggest an improvement or new utility.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should Arolel do?
    validations:
      required: true
  - type: dropdown
    id: processing
    attributes:
      label: Where should it run?
      options:
        - Browser only
        - Server side
        - Not sure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any privacy, performance, or compatibility concerns?
