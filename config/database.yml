# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: arolel_development
  username: <%= ENV.fetch('DB_USERNAME', 'wintan') %>
  host: <%= ENV.fetch('DB_HOST', '') %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: arolel_test
  username: <%= ENV.fetch('DB_USERNAME', 'wintan') %>
  host: <%= ENV.fetch('DB_HOST', '') %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["PRIMARY_DATABASE_URL"] || ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["CACHE_DATABASE_URL"] || ENV["PRIMARY_DATABASE_URL"] || ENV["DATABASE_URL"] %>
  queue:
    <<: *primary_production
    url: <%= ENV["QUEUE_DATABASE_URL"] || ENV["PRIMARY_DATABASE_URL"] || ENV["DATABASE_URL"] %>
  cable:
    <<: *primary_production
    url: <%= ENV["CABLE_DATABASE_URL"] || ENV["PRIMARY_DATABASE_URL"] || ENV["DATABASE_URL"] %>
